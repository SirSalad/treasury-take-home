name: CI

# Static quality gates for every push to main and every pull request.
# A PR is blocked unless type-checking, linting, formatting, unit tests,
# the WCAG 2.1 AA accessibility suite, and the production build all pass.
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend — types, lint, format, a11y, tests, build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        # Version is read from the "packageManager" field in frontend/package.json
        # (pnpm@11.2.2) so CI matches local exactly.
        uses: pnpm/action-setup@v4
        with:
          package_json_file: frontend/package.json

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type-check (tsc)
        run: pnpm typecheck

      - name: Lint (eslint)
        run: pnpm lint

      - name: Format check (prettier)
        run: pnpm run format:check

      - name: Unit + WCAG 2.1 AA accessibility tests (vitest + axe-core)
        run: pnpm test

      - name: Production build
        run: pnpm build

  backend:
    name: Backend — lint, format, types, tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install (package + dev extras)
        run: python -m pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check .

      - name: Format check (ruff)
        run: ruff format --check .

      - name: Type-check (mypy)
        run: mypy

      - name: Tests (pytest)
        run: pytest -q

  sbom:
    name: SBOM — CycloneDX (supply-chain inventory)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Frontend SBOM (npm/pnpm dependencies)
        uses: anchore/sbom-action@v0
        with:
          path: ./frontend
          format: cyclonedx-json
          output-file: sbom-frontend.cdx.json
          artifact-name: sbom-frontend.cdx.json

      - name: Backend SBOM (Python dependencies)
        uses: anchore/sbom-action@v0
        with:
          path: ./backend
          format: cyclonedx-json
          output-file: sbom-backend.cdx.json
          artifact-name: sbom-backend.cdx.json
