name: CI

# Static quality gates for every push to main and every pull request.
# A PR is blocked unless type-checking, linting, formatting, unit tests,
# the WCAG 2.1 AA accessibility suite, and the production build all pass.
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend — types, lint, format, a11y, tests, build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          # Match the node:24-slim base in docker/Dockerfile.frontend (Node 24
          # LTS; well above pnpm 11.2.2's >= 22.13 floor).
          node-version: 24

      - name: Enable pnpm via corepack (pinned 11.2.2)
        # Mirrors docker/Dockerfile.frontend exactly. pnpm 11.2.2 reads the
        # settings-only pnpm-workspace.yaml (no `packages` field) without error,
        # which pnpm/action-setup's resolved version did not.
        run: corepack enable && corepack prepare pnpm@11.2.2 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Dependency vulnerability audit (production deps)
        # Gate the dependency tree that actually ships. Dev-only tooling
        # advisories are out of the runtime gate and tracked via Dependabot.
        run: pnpm audit --prod --audit-level=high

      - name: Type-check (tsc)
        run: pnpm typecheck

      - name: Lint (eslint)
        run: pnpm lint

      - name: Format check (prettier)
        run: pnpm run format:check

      - name: Unit + WCAG 2.1 AA accessibility tests (vitest + axe-core)
        run: pnpm test

      - name: Production build
        run: pnpm build

      - name: Generated API types freshness (openapi-typescript)
        # src/lib/api.gen.ts must match the committed backend/openapi.json —
        # the client's wire types are generated, never hand-edited.
        run: pnpm gen:api:check

  backend:
    name: Backend — lint, format, types, tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install (package + dev extras)
        run: python -m pip install -e ".[dev]"

      - name: Dependency vulnerability audit (pip-audit)
        run: |
          python -m pip install --upgrade pip pip-audit
          pip-audit --skip-editable

      - name: Lint (ruff)
        run: ruff check .

      - name: Format check (ruff)
        run: ruff format --check .

      - name: Type-check (mypy)
        run: mypy

      - name: OpenAPI spec freshness
        # backend/openapi.json (the committed contract the frontend generates
        # its client types from) must match the FastAPI app.
        run: python scripts/export_openapi.py --check

      - name: Tests (pytest)
        # Run the correctness suite (unit + golden corpus). The `perf` (5s OCR
        # latency SLA) and `e2e` (real-OCR-through-HTTP) markers are wall-clock /
        # throughput benchmarks that are unreliable on shared CI runners, so they
        # are deselected here and exercised in a controlled environment instead.
        run: pytest -m "not perf and not e2e and not eval"

  sbom:
    name: SBOM — CycloneDX (supply-chain inventory)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Frontend SBOM (npm/pnpm dependencies)
        uses: anchore/sbom-action@v0
        with:
          path: ./frontend
          format: cyclonedx-json
          output-file: sbom-frontend.cdx.json
          artifact-name: sbom-frontend.cdx.json

      - name: Backend SBOM (Python dependencies)
        uses: anchore/sbom-action@v0
        with:
          path: ./backend
          format: cyclonedx-json
          output-file: sbom-backend.cdx.json
          artifact-name: sbom-backend.cdx.json
