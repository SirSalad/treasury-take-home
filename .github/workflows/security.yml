name: Security

# Static application security testing (SAST) and secret scanning, on top of the
# dependency audits in ci.yml and the CycloneDX SBOMs.
on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Weekly, so newly-disclosed advisories are caught even without a push.
    - cron: "0 6 * * 1"

permissions:
  contents: read

jobs:
  codeql:
    name: CodeQL SAST (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript, python]
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          language: ${{ matrix.language }}
          queries: security-and-quality

      # JS/TS and Python are interpreted — no build step required.
      - name: Analyze
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"

  gitleaks:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so the scan covers every commit
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
