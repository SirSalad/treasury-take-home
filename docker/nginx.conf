# nginx config for the frontend container.
#
# Serves the static SPA bundle and reverse-proxies API calls to the backend.
# The frontend issues requests under the /api prefix (see src/lib/api.ts); the
# trailing slash on proxy_pass strips that prefix, so /api/health -> backend
# /health. Keeping everything same-origin sidesteps CORS entirely.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Reverse-proxy the API. `backend` resolves via the compose network.
    location /api/ {
        proxy_pass http://backend:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # OCR can take a few seconds; give proxied requests room.
        proxy_read_timeout 60s;
    }

    # SPA fallback: client-side routes resolve to index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
