# Full stack: Postgres + FastAPI backend + nginx-served frontend.
#
# This base file publishes NO host ports, so it deploys as-is under a
# reverse-proxy PaaS (Dokploy/Traefik, Coolify, ...): the proxy reaches
# containers over the docker network by container port — route the domain to
# service `frontend`, port 80. Everything else is internal (backend:8000,
# db:5432); publishing them would only invite host port collisions, and
# exposing dev-credential Postgres on a shared host would be unsafe.
#
# For local development, add the dev overlay to publish the usual ports
# (frontend on :8080, backend on :8000):
#
#   docker compose -f docker/docker-compose.yml -f docker/docker-compose.dev.yml up --build
#
# Then open http://localhost:8080. For local psql:
#   docker compose -f docker/docker-compose.yml exec db psql -U postgres labelverify

name: ttb-label-verify

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: labelverify
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d labelverify"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    restart: unless-stopped
    environment:
      # Point at the compose Postgres service (psycopg v3 driver).
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/labelverify
      # The frontend is same-origin via the nginx proxy, but allow its origin
      # explicitly in case the API is called directly during development.
      # Override with the public URL when deploying behind a domain.
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8080}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      # Image has no curl; use Python (always present) to hit /health.
      test:
        ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      # Generous start_period: first boot warms the OCR model.
      start_period: 40s

  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy

volumes:
  pgdata:
