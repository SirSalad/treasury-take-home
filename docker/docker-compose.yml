# Full local stack: Postgres + FastAPI backend + nginx-served frontend.
#
#   docker compose -f docker/docker-compose.yml up --build
#
# Then open http://localhost:8080 (frontend). The frontend proxies /api/* to
# the backend, which exposes /health directly on :8000.
#
# Host port publishes are for local development and are overridable
# (FRONTEND_PORT / BACKEND_PORT). Under a reverse-proxy PaaS (Dokploy/Traefik,
# Coolify, ...) the proxy reaches containers over the docker network by
# container port — route the domain to service `frontend`, port 80 — and the
# published ports are unused; set FRONTEND_PORT/BACKEND_PORT if the defaults
# collide with other apps on the host. Postgres is intentionally not published:
# the backend reaches it as db:5432 on the internal network, and exposing it
# (with these dev credentials) on a shared host would be unsafe. For local
# psql, use: docker compose -f docker/docker-compose.yml exec db psql -U postgres labelverify

name: ttb-label-verify

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: labelverify
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d labelverify"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    restart: unless-stopped
    environment:
      # Point at the compose Postgres service (psycopg v3 driver).
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/labelverify
      # The frontend is same-origin via the nginx proxy, but allow its origin
      # explicitly in case the API is called directly during development.
      # Override with the public URL when deploying behind a domain.
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8080}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      # Image has no curl; use Python (always present) to hit /health.
      test:
        ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      # Generous start_period: first boot warms the OCR model.
      start_period: 40s

  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  pgdata:
